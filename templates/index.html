<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sumsearch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff !important;
            color: #202124;
        }

        body {
            min-height: 100vh;
        }

        main {
            min-height: 100vh;
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        main.with-results {
            justify-content: flex-start;
            padding-top: 88px;
            padding-bottom: 64px;
        }

        h1 {
            margin: 0 0 30px;
            font-size: clamp(54px, 10vw, 86px);
            font-weight: 400;
            letter-spacing: -5px;
            line-height: 1;
            color: #202124;
        }

        form {
            width: 100%;
        }

        .search-bar {
            width: min(584px, 100%);
            height: 46px;
            margin: 0 auto;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #ffffff;
        }

        .search-bar:hover,
        .search-bar:focus-within {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            border-color: transparent;
        }

        .search-icon {
            color: #9aa0a6;
            font-size: 18px;
            margin-right: 12px;
            line-height: 1;
        }

        input[type="text"] {
            flex: 1;
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: #202124;
            font-size: 16px;
        }

        .buttons {
            margin-top: 28px;
        }

        button {
            padding: 10px 18px;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            background: #f8f9fa;
            color: #3c4043;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            border-color: #dadce0;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .error {
            margin-top: 24px;
            color: #b00020;
            font-size: 14px;
        }

        .results {
            width: min(680px, 100%);
            margin-top: 42px;
            text-align: left;
        }

        ul {
            margin: 0;
            padding-left: 22px;
        }

        li {
            margin-bottom: 24px;
        }

        a {
            color: #1a0dab;
            font-size: 18px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .domain {
            margin-top: 4px;
            color: #202124;
            font-size: 13px;
        }

        li p {
            margin: 6px 0 0;
            color: #4d5156;
            line-height: 1.5;
            font-size: 14px;
        }

        @media (max-width: 560px) {
            main.with-results {
                padding-top: 48px;
            }

            h1 {
                font-size: 52px;
                letter-spacing: -3px;
            }

            .search-bar {
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <main class="{% if results %}with-results{% endif %}">
        <h1>Sumsearch</h1>

        <form method="POST">
            <input type="hidden" name="provider" value="{{ selected_provider }}">

            <div class="search-bar">
                <span class="search-icon">⌕</span>
                <input
                    type="text"
                    name="query"
                    placeholder="Search"
                    value="{{ query }}"
                    autofocus
                >
            </div>

            <div class="buttons">
                <button type="submit">Search</button>
            </div>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if results %}
            <section class="results">
                <ul>
                    {% for result in results %}
                        <li>
                            <a href="{{ result.url }}" target="_blank" rel="noopener noreferrer">
                                {{ result.title | safe }}
                            </a>
                            <div class="domain">{{ result.domain }}</div>
                            <p>{{ result.snippet }}</p>
                        </li>
                    {% endfor %}
                </ul>
            </section>
        {% endif %}
    </main>
</body>
</html>
